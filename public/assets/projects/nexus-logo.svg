<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer hexagon -->
  <polygon points="64,8 112,36 112,92 64,120 16,92 16,36" 
    fill="none" stroke="url(#grad)" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Inner hexagon -->
  <polygon points="64,24 96,44 96,84 64,104 32,84 32,44" 
    fill="url(#grad)" opacity="0.2"/>
  
  <!-- Center node -->
  <circle cx="64" cy="64" r="16" fill="url(#grad)"/>
  
  <!-- Orbiting nodes -->
  <circle cx="64" cy="20" r="8" fill="#10B981"/>
  <circle cx="108" cy="64" r="8" fill="#8B5CF6"/>
  <circle cx="64" cy="108" r="8" fill="#F59E0B"/>
  <circle cx="20" cy="64" r="8" fill="#EC4899"/>
  
  <!-- Connecting lines -->
  <line x1="64" y1="36" x2="64" y2="28" stroke="#10B981" stroke-width="2"/>
  <line x1="88" y1="64" x2="100" y2="64" stroke="#8B5CF6" stroke-width="2"/>
  <line x1="64" y1="92" x2="64" y2="100" stroke="#F59E0B" stroke-width="2"/>
  <line x1="40" y1="64" x2="28" y2="64" stroke="#EC4899" stroke-width="2"/>
</svg>